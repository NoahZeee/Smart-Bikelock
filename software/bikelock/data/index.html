<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bike Lock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #999; margin-bottom: 30px; }
        .status-display {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .lock-icon {
            font-size: 64px;
            margin: 0 0 15px 0;
        }
        .status-text { font-size: 24px; font-weight: bold; color: #333; margin: 10px 0; }
        .status-subtext { color: #999; font-size: 14px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #666; font-weight: 500; margin-bottom: 8px; }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #2a5298;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #2a5298; color: white; }
        .btn-primary:hover { background: #1e3c72; transform: translateY(-2px); }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-danger:hover { background: #ee5a52; transform: translateY(-2px); }
        .btn-success { background: #51cf66; color: white; }
        .btn-success:hover { background: #40c057; transform: translateY(-2px); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .full-width { grid-column: 1 / -1; }
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .loading { opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Smart Bike Lock</h1>
        <p class="subtitle">Control your lock wirelessly</p>
        
        <div class="status-display">
            <div class="lock-icon" id="lockIcon">🔓</div>
            <div class="status-text" id="statusText">UNLOCKED</div>
            <div class="status-subtext">Last update: now</div>
        </div>

        <div id="message"></div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <div class="button-group">
            <button class="btn-primary" id="unlockBtn" onclick="unlock()">Unlock</button>
            <button class="btn-danger" id="lockBtn" onclick="lock()">Lock</button>
        </div>

        <div class="button-group">
            <button class="btn-success" id="setPasswordBtn" onclick="setPassword()">Set Password</button>
            <button class="btn-primary" id="refreshBtn" onclick="refreshStatus()">Refresh</button>
        </div>

        <div class="button-group full-width">
            <button class="btn-danger" id="resetBtn" onclick="reset()">Reset Device</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://' + window.location.hostname;
        
        async function fetchStatus() {
            try {
                const response = await fetch(API_BASE + '/status');
                const data = await response.json();
                updateDisplay(data.status);
            } catch (error) {
                console.error('Error fetching status:', error);
                showMessage('Error connecting to device', 'error');
            }
        }

        function updateDisplay(status) {
            const icon = document.getElementById('lockIcon');
            const text = document.getElementById('statusText');
            const lockBtn = document.getElementById('lockBtn');
            const unlockBtn = document.getElementById('unlockBtn');
            const setPasswordBtn = document.getElementById('setPasswordBtn');
            
            if (status === 'LOCKED') {
                icon.textContent = '🔒';
                text.textContent = 'LOCKED';
                // When locked: can only unlock
                lockBtn.disabled = true;
                unlockBtn.disabled = false;
                setPasswordBtn.disabled = true;
            } else {
                icon.textContent = '🔓';
                text.textContent = 'UNLOCKED';
                // When unlocked: can lock or set password
                lockBtn.disabled = false;
                unlockBtn.disabled = true;
                setPasswordBtn.disabled = false;
            }
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = msg;
            setTimeout(() => { msgDiv.textContent = ''; msgDiv.className = ''; }, 3000);
        }

        async function unlock() {
            const pwd = document.getElementById('password').value;
            if (!pwd) {
                showMessage('Please enter a password', 'error');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/unlock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                const data = await response.json();
                showMessage('Unlocked!', 'success');
                await fetchStatus();
            } catch (error) {
                showMessage('Error unlocking', 'error');
            }
        }

        async function lock() {
            try {
                const response = await fetch(API_BASE + '/lock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                showMessage('Locked!', 'success');
                await fetchStatus();
            } catch (error) {
                showMessage('Error locking', 'error');
            }
        }

        async function setPassword() {
            const pwd = document.getElementById('password').value;
            if (!pwd) {
                showMessage('Please enter a password', 'error');
                return;
            }
            
            try {
                const response = await fetch(API_BASE + '/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                const data = await response.json();
                document.getElementById('password').value = '';
                showMessage('Password updated and locked!', 'success');
                await fetchStatus();
            } catch (error) {
                showMessage('Error setting password', 'error');
            }
        }

        async function refreshStatus() {
            await fetchStatus();
            showMessage('Status updated', 'success');
        }

        async function reset() {
            if (!confirm('Are you sure? This will reset the device.')) return;
            
            try {
                const response = await fetch(API_BASE + '/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                showMessage('Device reset!', 'success');
                await new Promise(r => setTimeout(r, 2000));
                await fetchStatus();
            } catch (error) {
                showMessage('Error resetting', 'error');
            }
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchStatus, 5000);
        
        // Initial status fetch
        fetchStatus();
    </script>
</body>
</html>
