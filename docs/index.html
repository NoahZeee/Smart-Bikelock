<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bike Lock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Smart Bike Lock</h1>
            <p class="subtitle">Bluetooth Control System</p>
        </header>

        <!-- Status Section -->
        <section class="status-section">
            <div class="status-card" id="statusCard">
                <div class="status-icon" id="statusIcon">⊗</div>
                <div class="status-text">
                    <h2>Connection</h2>
                    <p id="statusMessage">Disconnected</p>
                </div>
            </div>
        </section>

        <!-- Connection Section -->
        <section class="connection-section">
            <button id="connectBtn" class="btn btn-primary btn-large">
                Connect to Lock
            </button>
            <p class="info-text" id="deviceName"></p>
        </section>

        <!-- Main Controls Section -->
        <section class="controls-section" id="controlsSection" style="display: none;">
            <!-- Lock Status Display -->
            <div class="lock-status-display">
                <div class="lock-display" id="lockDisplay">
                    <div id="lockIndicator" class="lock-indicator">⊗</div>
                    <p id="lockStatusText">Connecting...</p>
                </div>
            </div>

            <!-- Password Setup/Entry -->
            <div class="password-section">
                <label for="passwordInput">Password:</label>
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="Enter lock password"
                    maxlength="32"
                >
            </div>

            <!-- Lock Control Buttons -->
            <div class="button-group">
                <button id="setPasswordBtn" class="btn btn-info">
                    Set Password
                </button>
                <button id="lockBtn" class="btn btn-danger">
                    Lock
                </button>
                <button id="unlockBtn" class="btn btn-success">
                    Unlock
                </button>
            </div>

            <!-- Status Button -->
            <div class="button-group">
                <button id="statusBtn" class="btn btn-secondary">
                    Check Status
                </button>
                <button id="resetBtn" class="btn btn-warning">
                    Reset Device
                </button>
            </div>

            <!-- Disconnect Button -->
            <button id="disconnectBtn" class="btn btn-secondary-outline">
                Disconnect
            </button>
        </section>

        <!-- Messages Section -->
        <section class="messages-section">
            <div id="messageBox" class="message-box"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Requires Web Bluetooth support (Chrome/Edge on Android/macOS)</p>
            <p class="version">v1.0.0</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
